name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/hf-sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git user for subtree split
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # Use the server directory as the root for the HF Space
          git remote add hf https://azharsharif:$HF_TOKEN@huggingface.co/spaces/azharsharif/seesby-crawler

          # Split the server/ directory into a temporary branch
          git subtree split --prefix server -b hf-split
          
          # Push the temporary branch to the remote main branch with force
          git push hf hf-split:main --force
