<!DOCTYPE html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seesby | Smart SEO Platform & Agency</title>
    <script>
      /* No-flash theme bootstrap: apply persisted theme before first paint. */
      (function () {
        try {
          var t = localStorage.getItem('seesby:theme') || 'system';
          if (t !== 'dark' && t !== 'light' && t !== 'system') t = 'system';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'system');
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preload" href="/fonts/satoshi/satoshi.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/fonts/satoshi/satoshi.css"></noscript>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#F59E0B" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Satoshi', 'Inter', 'sans-serif'],
              heading: ['Satoshi', 'Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                bg: '#0B0B0A',      // Soft near-black main bg
                card: '#141412',    // Distinct card background
                sidebar: '#0E0E0C', // Sidebar background
                amber: '#F59E0B',   // Seesby Amber (hero)
                amberHover: '#FBBF24',
                amberDeep: '#D97706',
                purple: '#7C3AED',  // Neon Purple (kept for accents)
                yellow: '#FACC15',  // Neon Yellow
                green: '#22C55E',   // Neon Green (status)
                ink: '#1C1917',     // Bee ink
                stone: '#78716C',   // Muted gray wordmark suffix
                gray: '#9CA3AF',    // Text Gray
                darkgray: '#27272A', // Borders/Separators
              }
            },
            borderRadius: {
              '3xl': '1.5rem',
              '4xl': '2rem',
              '5xl': '2.5rem',
            },
            boxShadow: {
              'glow': '0 0 20px rgba(245, 158, 11, 0.18)',
              'glow-sm': '0 0 10px rgba(245, 158, 11, 0.12)',
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'glass': 'linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: var(--bg-main, #050505);
        color: var(--text-secondary, #E5E5E5);
      }
      /* Clean Scrollbar - Hidden until interaction */
      ::-webkit-scrollbar {
        width: 0px;
        height: 0px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: transparent;
        border-radius: 10px;
        transition: background 0.3s ease;
      }
      
      /* Only show when hovering over a scrollable element */
      *:hover::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *:hover::-webkit-scrollbar-thumb {
        background: rgba(39, 39, 42, 0.6);
      }
      *:hover::-webkit-scrollbar-thumb:hover {
        background: rgba(63, 63, 70, 0.9);
      }
      
      /* Firefox support */
      * {
        scrollbar-width: none;
      }
      *:hover {
        scrollbar-width: thin;
      }
      
      /* Subtle grid pattern for background */
      .bg-grid-pattern {
        background-image: linear-gradient(to right, #111 1px, transparent 1px),
                          linear-gradient(to bottom, #111 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
