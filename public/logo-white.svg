<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
 <defs>
  <clipPath id="bodyClipW"><ellipse cx="50" cy="58" rx="22" ry="26"/></clipPath>
 </defs>

 <!-- MARK (pure white, for dark backgrounds / reverses) -->
 <g transform="translate(41, 10)">
  <!-- Wings -->
  <path d="M48 36 C34 16 12 18 9 34 C7 48 24 58 48 48 Z"
   fill="#000000" stroke="#FFFFFF" stroke-width="1.5"/>
  <path d="M52 36 C66 16 88 18 91 34 C93 48 76 58 52 48 Z"
   fill="#000000" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Legs -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round">
   <path d="M30 60 Q20 68 16 76"/>
   <path d="M31 67 Q22 75 19 83"/>
   <path d="M33 73 Q26 81 24 89"/>
   <path d="M70 60 Q80 68 84 76"/>
   <path d="M69 67 Q78 75 81 83"/>
   <path d="M67 73 Q74 81 76 89"/>
  </g>

  <!-- Stinger -->
  <path d="M44 82 L50 91 L56 82 Z" fill="#FFFFFF"/>

  <!-- Body -->
  <ellipse cx="50" cy="58" rx="22" ry="26" fill="#FFFFFF"/>
  <g clip-path="url(#bodyClipW)">
   <rect x="22" y="52" width="56" height="5" fill="#000000"/>
   <rect x="22" y="64" width="56" height="5" fill="#000000"/>
  </g>

  <!-- Head -->
  <circle cx="50" cy="30" r="12" fill="#FFFFFF"/>

  <!-- Eyes (negative space, black) -->
  <circle cx="45" cy="30" r="3" fill="#000000"/>
  <circle cx="55" cy="30" r="3" fill="#000000"/>

  <!-- Antennae -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round">
   <path d="M45 20 Q38 10 33 7"/>
   <path d="M55 20 Q62 10 67 7"/>
  </g>
  <circle cx="33" cy="7" r="2" fill="#FFFFFF"/>
  <circle cx="67" cy="7" r="2" fill="#FFFFFF"/>
 </g>

 <!-- WORDMARK: "seesby", pure white -->
 <g transform="translate(150, 0)">
   <text x="0" y="74" font-family="'Satoshi','Quicksand','Nunito Sans','Segoe UI',system-ui,sans-serif"

    font-size="46" letter-spacing="-1"><tspan font-weight="600" fill="#FFFFFF">sees</tspan><tspan font-weight="300" fill="#FFFFFF" letter-spacing="-0.5">by</tspan></text>
 </g>
</svg>
