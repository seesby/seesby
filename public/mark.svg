<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
 <defs>
  <clipPath id="bodyClip"><ellipse cx="50" cy="58" rx="22" ry="26"/></clipPath>
 </defs>

 <!-- HOVER: whole bee bobs gently forever -->
 <g>
  <animateTransform attributeName="transform" type="translate" additive="sum"
   values="0 0; 0 -2.5; 0 0" keyTimes="0;0.5;1" dur="3.2s"
   repeatCount="indefinite" calcMode="spline"
   keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>

  <!-- ENTRANCE: drop + fade + settle (once) -->
  <g>
   <animateTransform attributeName="transform" type="translate" additive="sum"
    values="0 -26; 0 0" keyTimes="0;1" dur="0.8s" begin="0.1s" fill="freeze"
    calcMode="spline" keySplines="0.16 0.84 0.3 1"/>
   <animate attributeName="opacity" values="0;1" keyTimes="0;1" dur="0.5s"
    begin="0.1s" fill="freeze"/>

   <!-- Wings: flutter forever + unfurl on entrance.
        Pivot at body center (50,58) via translate/scale/translate-back nesting. -->
   <g transform="translate(50,58)">
    <g>
     <!-- continuous flutter (scaleX about center 50,58) -->
     <animateTransform attributeName="transform" type="scale" additive="sum"
      values="1 1; 0.82 1; 1 1" keyTimes="0;0.5;1" dur="0.22s"
      repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
     <!-- entrance unfurl (scale 0.4->1 about center) -->
     <animateTransform attributeName="transform" type="scale" additive="sum"
      values="0.4 0.4; 1 1" keyTimes="0;1" dur="0.7s" begin="0.1s" fill="freeze"
      calcMode="spline" keySplines="0.2 0.8 0.2 1"/>

     <!-- Wings drawn relative to pivot (subtract 50,58) -->
     <g transform="translate(-50,-58)">
      <path d="M48 36 C34 16 12 18 9 34 C7 48 24 58 48 48 Z"
       fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
      <path d="M52 36 C66 16 88 18 91 34 C93 48 76 58 52 48 Z"
       fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
     </g>
    </g>
   </g>

   <!-- Legs: one confident stroke each, roots hidden behind body -->
   <g fill="none" stroke="#92400E" stroke-width="2.2" stroke-linecap="round" opacity="0.55">
    <path d="M30 60 Q20 68 16 76"/>
    <path d="M31 67 Q22 75 19 83"/>
    <path d="M33 73 Q26 81 24 89"/>
    <path d="M70 60 Q80 68 84 76"/>
    <path d="M69 67 Q78 75 81 83"/>
    <path d="M67 73 Q74 81 76 89"/>
   </g>

   <!-- Stinger (integrated at body base) -->
   <path d="M44 82 L50 91 L56 82 Z" fill="#D97706"/>

   <!-- Body -->
   <ellipse cx="50" cy="58" rx="22" ry="26" fill="#F59E0B" stroke="#D97706" stroke-width="1.6"/>

   <!-- Stripes (flat, clipped to body) -->
   <g clip-path="url(#bodyClip)">
    <rect x="22" y="52" width="56" height="5" fill="#D97706" opacity="0.85"/>
    <rect x="22" y="64" width="56" height="5" fill="#D97706" opacity="0.85"/>
   </g>

   <!-- Head -->
   <circle cx="50" cy="30" r="12" fill="#F59E0B" stroke="#D97706" stroke-width="1.6"/>

   <!-- Eyes -->
   <circle cx="45" cy="30" r="3" fill="#1C1917"/>
   <circle cx="55" cy="30" r="3" fill="#1C1917"/>
   <circle cx="44" cy="29" r="1" fill="#FFFFFF" opacity="0.85"/>
   <circle cx="54" cy="29" r="1" fill="#FFFFFF" opacity="0.85"/>

   <!-- Antennae -->
   <g fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round">
    <path d="M45 20 Q38 10 33 7"/>
    <path d="M55 20 Q62 10 67 7"/>
   </g>
   <circle cx="33" cy="7" r="2" fill="#D97706"/>
   <circle cx="67" cy="7" r="2" fill="#D97706"/>
  </g>
 </g>
</svg>
